<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scrabble Trainer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Scrabble Trainer</h1>

<h2>Select List</h2>

<select id="listSelect"></select>
<button id="loadList">Load List</button>

<h2>Create List</h2>

<label>List Name</label>
<input id="listName">

<label>Words (one per line)</label>
<textarea id="wordInput"></textarea>

<button id="saveList">Save List</button>

<hr>

<div id="trainer">

<div id="letters" aria-live="assertive"></div>

<div id="anagramCount"></div>

<input
id="answer"
type="text"
autocorrect="off"
autocapitalize="none"
spellcheck="false"
autocomplete="off"
placeholder="Type answers separated by spaces"
/>

<button id="submitBtn">Submit</button>
<button id="revealBtn">Reveal</button>
<button id="nextBtn">Next</button>

<div id="feedback" aria-live="polite"></div>

</div>

<script src="script.js"></script>
 </body>
</html>
